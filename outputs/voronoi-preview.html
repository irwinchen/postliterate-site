<style>
  :root { color-scheme: light dark; }
  body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: #f3efe1; color: #1a1a1a; padding: 24px; }
  h1 { font-weight: 500; font-size: 18px; margin: 0 0 4px; }
  p.caption { margin: 0 0 16px; color: #666; font-size: 13px; }
  .stage { background: #fff; border: 1px solid #ddd; padding: 16px; margin-bottom: 16px; }

  .bubble-pct { font-size: 11px; fill: rgba(255,255,255,0.78); pointer-events: none; font-weight: 400; }

  .stage--modal .bg-group {
    filter: grayscale(1) blur(6px) brightness(1.1);
    opacity: 0.18;
    transition: filter 300ms ease-out, opacity 300ms ease-out;
  }

  .close-btn { fill: rgba(0,0,0,0.06); cursor: pointer; }
  .close-x { stroke: #333; stroke-width: 2; stroke-linecap: round; }
  .selector { font-size: 13px; padding: 4px 8px; margin-right: 8px; }
</style>

<p class="caption">Top: root state. Bottom: modal-open state — root cluster dims+blurs in the background, parent bubble zooms to canvas center, children pack inside.</p>

  </div>

</div>

const SVG_NS = 'http://www.w3.org/2000/svg';

function el(tag, attrs = {}, text) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text != null) e.textContent = text;
  return e;
}
function labelMode(r) {
  if (r >= 50) return 'full';
  if (r >= 28) return 'label';
  return 'none';
}

const ROOT_TOTAL = DATA['voronoi-root'].cells.reduce((s, c) => s + c.value, 0);
function rootPct(v) { return (v / ROOT_TOTAL * 100).toFixed(1) + '%'; }

function renderBubbles(svg, bubbles, opts = {}) {
  for (const c of bubbles) {
    const mode = labelMode(c.r);
    svg.appendChild(el('circle', {
      cx: c.x, cy: c.y, r: c.r, fill: c.color || '#888', class: 'bubble-fill',
    }));
    if (mode !== 'none') {
      svg.appendChild(el('text', {
        x: c.x, y: mode === 'full' ? c.y - 4 : c.y,
        'text-anchor': 'middle', 'dominant-baseline': 'middle',
        class: 'bubble-label',
      }, c.label));
    }
    if (mode === 'full' && opts.pctFn) {
      svg.appendChild(el('text', {
        x: c.x, y: c.y + 16,
        'text-anchor': 'middle', 'dominant-baseline': 'middle',
        class: 'bubble-pct',
      }, opts.pctFn(c.value)));
    }
  }
}

function renderRoot() {
  const j = DATA['voronoi-root'];
  const svg = document.getElementById('svg-root');
  svg.innerHTML = '';
  renderBubbles(svg, j.cells, { pctFn: rootPct });
}

function renderModal(parentId) {
  const root = DATA['voronoi-root'];
  const modal = DATA['voronoi-' + parentId];
  const svg = document.getElementById('svg-modal');
  svg.innerHTML = '';

  const bg = el('g', { class: 'bg-group' });
  renderBubbles(bg, root.cells, { pctFn: rootPct });
  svg.appendChild(bg);

  const m = el('g', { class: 'modal-group' });
  m.appendChild(el('circle', {
    cx: modal.parent.openX, cy: modal.parent.openY, r: modal.parent.openR,
    fill: modal.parent.color || '#888', class: 'bubble-fill',
    style: 'stroke: rgba(255,255,255,0.5); stroke-width: 1.5;',
  }));
  renderBubbles(m, modal.cells, {});

  const panelX = 800, panelY = 80, panelW = 230, panelH = 540;
  m.appendChild(el('rect', { x: panelX, y: panelY, width: panelW, height: panelH, class: 'panel-rect' }));
  m.appendChild(el('text', { x: panelX + 18, y: panelY + 36, style: 'font-size: 20px; font-weight: 700; fill: ' + (modal.parent.color || '#888') + ';' }, modal.parent.label));
  m.appendChild(el('text', { x: panelX + 18, y: panelY + 60, style: 'font-size: 13px; fill: #888;' }, modal.parent.value + '% of pre-training tokens'));
  m.appendChild(el('text', { x: panelX + 18, y: panelY + 100, style: 'font-size: 12px; fill: #444;' }, '[description]'));
  m.appendChild(el('text', { x: panelX + 18, y: panelY + 130, style: 'font-size: 12px; fill: #444;' }, '[bullets]'));
  m.appendChild(el('text', { x: panelX + 18, y: panelY + 160, style: 'font-size: 12px; fill: #444;' }, '[screenshot]'));

  const cx = panelX + panelW - 20, cy = panelY + 20, r = 14;
  m.appendChild(el('circle', { cx, cy, r, class: 'close-btn' }));
  m.appendChild(el('line', { x1: cx - 5, y1: cy - 5, x2: cx + 5, y2: cy + 5, class: 'close-x' }));
  m.appendChild(el('line', { x1: cx + 5, y1: cy - 5, x2: cx - 5, y2: cy + 5, class: 'close-x' }));

  svg.appendChild(m);
}

const PARENTS = DATA['voronoi-root'].cells.filter(c => c.hasChildren);
const sel = document.getElementById('parent-select');
for (const p of PARENTS) {
  const opt = document.createElement('option');
  opt.value = p.id;
  opt.textContent = p.label + ' (' + p.value + '%)';
  sel.appendChild(opt);
}
sel.addEventListener('change', () => renderModal(sel.value));

renderRoot();
renderModal(PARENTS[0].id);
</script>
