<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virgil Insights</title>
  <link rel="stylesheet" href="insights.css">
</head>
<body>
  <div class="insights">
    <header class="insights-header">
      <h1 class="insights-title"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> Reading Insights</h1>
      <a class="insights-header-link" id="open-library" href="#"><img src="../icons/virgil_library.svg" alt="" width="14" height="14"> Library</a>
    </header>

    <section class="insights-section">
      <h2 class="insights-section-title">Reading Activity</h2>
      <div class="heatmap-container">
        <div></div>
        <div class="heatmap-months" id="heatmap-months"></div>
        <div class="heatmap-labels">
          <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div class="heatmap" id="heatmap"></div>
      </div>
      <div class="heatmap-legend">
        <span class="heatmap-legend-label">Less</span>
        <span class="heatmap-cell" style="opacity: 0.15"></span>
        <span class="heatmap-cell" style="opacity: 0.35"></span>
        <span class="heatmap-cell" style="opacity: 0.6"></span>
        <span class="heatmap-cell" style="opacity: 0.85"></span>
        <span class="heatmap-cell" style="opacity: 1"></span>
        <span class="heatmap-legend-label">More</span>
      </div>
      <div class="insights-streak" id="streak-info"></div>
    </section>

    <div class="insights-grid">
      <section class="stat-card">
        <div class="stat-value" id="completion-rate">--</div>
        <div class="stat-label">of articles finished</div>
      </section>

      <section class="stat-card">
        <div class="stat-value" id="avg-depth">--</div>
        <div class="stat-label">average reading depth</div>
      </section>

      <section class="stat-card">
        <div class="stat-value" id="avg-session">--</div>
        <div class="stat-label">average session</div>
      </section>

      <section class="stat-card">
        <div class="stat-value" id="total-time">--</div>
        <div class="stat-label">total reading time</div>
      </section>
    </div>

    <section class="insights-section">
      <h2 class="insights-section-title">Focus Sessions</h2>
      <p class="insights-detail" id="session-distribution"></p>
      <p class="insights-detail" id="longest-session"></p>
    </section>

    <section class="insights-section">
      <h2 class="insights-section-title">Library Stats</h2>
      <div class="insights-detail" id="library-stats"></div>
    </section>

    <section class="insights-section" id="top-sources-section" style="display: none;">
      <h2 class="insights-section-title">Top Sources</h2>
      <div id="top-sources"></div>
    </section>

    <section class="insights-section" id="recently-completed-section" style="display: none;">
      <h2 class="insights-section-title">Recently Completed</h2>
      <div id="recently-completed"></div>
    </section>
  </div>

  <script src="insights.js"></script>
</body>
</html>
