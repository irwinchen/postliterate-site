<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="popup-header">
      <img class="popup-icon" src="../icons/icon-32.png" alt="" width="20" height="20">
      <h1 class="popup-title">Virgil</h1>
      <span class="popup-subtitle">Deep Reader</span>
    </div>

    <div class="popup-actions">
      <button id="start-reading" class="btn-primary">
        Start Reading
      </button>
      <button id="edit-first" class="btn-secondary">
        Edit First
      </button>
    </div>

    <div class="settings">
      <div class="setting-row">
        <label class="setting-label">Theme</label>
        <div class="setting-options" id="theme-options">
          <button class="setting-btn active" data-value="auto">Auto</button>
          <button class="setting-btn" data-value="light">Light</button>
          <button class="setting-btn" data-value="dark">Dark</button>
        </div>
      </div>

      <div class="setting-row">
        <label class="setting-label">Speed</label>
        <div class="setting-options" id="speed-options">
          <button class="setting-btn" data-value="slow">Slow</button>
          <button class="setting-btn active" data-value="medium">Medium</button>
          <button class="setting-btn" data-value="fast">Fast</button>
        </div>
      </div>
    </div>

    <div class="popup-pdf">
      <button class="popup-section-toggle" id="pdf-toggle">PDF <span class="toggle-arrow">&#9654;</span></button>
      <div class="popup-pdf-body" id="pdf-body" style="display: none;">
        <div class="setting-row">
          <label class="setting-label">API Key</label>
          <input type="password" class="setting-input" id="reducto-key" placeholder="Reducto API key">
        </div>
        <div class="setting-hint">Get a free key at <a href="https://reducto.ai" target="_blank">reducto.ai</a></div>
        <div class="popup-pdf-import-row">
          <button class="btn-secondary btn-small" id="import-pdf-popup">Import PDF</button>
          <button class="btn-cancel" id="cancel-pdf-popup" style="display: none;">Cancel</button>
        </div>
        <input type="file" id="pdf-file-popup" accept=".pdf" hidden>
        <div class="popup-pdf-progress" id="pdf-progress-popup" style="display: none;">
          <div class="popup-pdf-status" id="pdf-status-popup"></div>
          <div class="popup-pdf-bar"><div class="popup-pdf-fill" id="pdf-fill-popup"></div></div>
        </div>
      </div>
    </div>

    <div class="popup-footer">
      <button id="open-library" class="btn-link"><img src="../icons/virgil_library.svg" alt="" width="14" height="14"> Library</button>
      <button id="open-insights" class="btn-link"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> Insights</button>
      <span class="shortcut-hint">Alt+R to toggle</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
