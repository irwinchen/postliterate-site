    <script>
        // ============================================================================

        // ============================================================================

        // ============================================================================
        // UTILITY FUNCTIONS
        // ============================================================================

        // Interpolate value at a specific year from a series
        function interpolateValue(series, targetYear) {
            for (let i = 0; i < series.length - 1; i++) {
                if (series[i].year <= targetYear && series[i + 1].year >= targetYear) {
                    const before = series[i];
                    const after = series[i + 1];
                    const progress = (targetYear - before.year) / (after.year - before.year);
                    return before.value + (after.value - before.value) * progress;
                }
            }

            if (targetYear < series[0].year) return 0;
            return series[series.length - 1].value;
        }

        // Add adaptive sampling points to timeline
        function addTimelineRange(timeline, start, end, step) {
            for (let year = start; year <= end; year += step) {
                timeline.push(year);
            }
        }

        // Format year as absolute (BCE/CE) — used in tooltips alongside years-ago.
        function formatYear(year) {
            const rounded = Math.round(year);
            if (rounded < 0) return `${Math.abs(rounded)} BCE`;
            if (rounded === 0) return '0';
            return `${rounded} CE`;
        }

        // Format year as relative-to-present — used on the X axis.
        // PRESENT_YEAR is dynamic (today's year), so "Now" tracks real time.
        function formatYearsAgo(year) {
            const diff = Math.round(PRESENT_YEAR - year);
            if (diff === 0) return 'Now';
            if (diff > 0) return `${diff.toLocaleString()} yrs ago`;
            return `in ${(-diff).toLocaleString()} yrs`;
        }

        // Get stroke style for technology (gradient or solid)
        function getStrokeStyle(techName, category) {
            const declineInfo = DECLINING_TECHNOLOGIES[techName];
            if (declineInfo && declineInfo.gradient) {
                return `url(#${techName.toLowerCase().replace(/\s+/g, '-')}-opacity-gradient)`;
            }
            return CATEGORY_COLORS[category];
        }

        // Get arrow opacity for declined technologies
        function getArrowOpacity(techName) {
            const declineInfo = DECLINING_TECHNOLOGIES[techName];
            return declineInfo ? declineInfo.fadeOpacity : 1;
        }

        // ============================================================================
        // DATA GENERATION
        // ============================================================================

        // Generate time series data with adoption/decline curves
        function generateTimeSeries(tech) {
            const series = [];
            const startYear = tech.Year_Numeric;
            const peakPercent = tech.Access_Pop_Percent;

            // Special case: Oral (Speech) - constant baseline
            if (tech.Category === "Oral") {
                for (let year = -50000; year < -40000; year += 100) {
                    const progress = (year - (-50000)) / 10000;
                    const logistic = 100 / (1 + Math.exp(-10 * (progress - 0.5)));
                    series.push({ year, value: logistic });
                }
                for (let year = -40000; year <= 0; year += 1000) {
                    series.push({ year, value: 100 });
                }
                for (let year = 0; year <= 2030; year += 50) {
                    series.push({ year, value: 100 });
                }
                series.push({ year: 2030, value: 100 });
                return series;
            }

            // Determine adoption and decline patterns
            const declineInfo = DECLINING_TECHNOLOGIES[tech.Watershed];
            let adoptionYears;

            if (declineInfo) {
                adoptionYears = (declineInfo.declineStart - startYear) * 0.3;
            } else {
                adoptionYears = Math.max(20, (2030 - startYear) * 0.15);
            }

            // Before technology starts - very sparse
            for (let year = -50000; year < startYear - 500; year += 1000) {
                series.push({ year, value: 0 });
            }

            // Just before start - medium density
            for (let year = Math.max(-50000, startYear - 500); year < startYear; year += 50) {
                series.push({ year, value: 0 });
            }

            // During active period - high density
            const activeEnd = declineInfo ? declineInfo.declineStart + declineInfo.declineYears : 2030;
            for (let year = startYear; year <= activeEnd; year += 5) {
                if (declineInfo && year > declineInfo.declineStart + declineInfo.declineYears) {
                    series.push({ year, value: peakPercent * 0.05 });
                } else if (declineInfo && year > declineInfo.declineStart) {
                    const declineProgress = (year - declineInfo.declineStart) / declineInfo.declineYears;
                    const remaining = 1 - Math.pow(declineProgress, 0.7);
                    series.push({ year, value: peakPercent * Math.max(0.05, remaining) });
                } else if (year < startYear + adoptionYears) {
                    const progress = (year - startYear) / adoptionYears;
                    const logistic = 1 / (1 + Math.exp(-8 * (progress - 0.5)));
                    series.push({ year, value: peakPercent * logistic });
                } else {
                    series.push({ year, value: peakPercent });
                }
            }

            // After active period - sparse sampling to 2030
            if (activeEnd < 2030) {
                const value = declineInfo && activeEnd > declineInfo.declineStart + declineInfo.declineYears
                    ? peakPercent * 0.05
                    : peakPercent;
                for (let year = activeEnd + 50; year <= 2030; year += 50) {
                    series.push({ year, value });
                }
            }

            // Ensure endpoint
            if (series[series.length - 1].year !== 2030) {
                series.push({ year: 2030, value: series[series.length - 1].value });
            }

            return series;
        }

        // Create master timeline with adaptive density
        function createMasterTimeline() {
            const timeline = [];
            addTimelineRange(timeline, -50000, -10000, 2000);
            addTimelineRange(timeline, -10000, -1000, 500);
            addTimelineRange(timeline, -1000, 0, 100);
            addTimelineRange(timeline, 0, 1800, 50);
            addTimelineRange(timeline, 1800, 2030, 10);
            return timeline;
        }

        // Resample series to master timeline
        function resampleSeries(rawSeries, masterTimeline) {
            return masterTimeline.map(targetYear => ({
                year: targetYear,
                value: interpolateValue(rawSeries, targetYear)
            }));
        }

        // ============================================================================
        // TOOLTIP FUNCTIONS
        // ============================================================================

        const TOOLTIP_DESCRIPTIONS = {
            "Spoken Language": "The foundation of human communication, enabling immediate face-to-face exchange of ideas through speech. Remains the primary mode of interpersonal communication.",
            "Visual Art": "From cave paintings to modern art, visual representation enabled permanent recording of ideas and experiences. Continues as a vital form of expression across cultures.",
            "Cuneiform": "Mesopotamia's wedge-shaped writing on clay tablets marked humanity's first written records. Mass use ended by the 1st millennium BCE, with scholarly use continuing until the 1st century CE as alphabetic scripts became dominant.",
            "Hieroglyphics": "Ancient Egypt's pictographic and logographic script preserved knowledge for millennia. Last temple inscription at Philae in 394 CE, with Demotic script ending around 450 CE as Greek and Coptic alphabets became dominant.",
            "Logographic Writing": "Chinese characters representing words enabled complex written communication in East Asia. Remains in use today alongside alphabetic systems.",

            "Telegraph": "First electrical communication system enabling instant text transmission across vast distances. Replaced by telephone and telex systems, with commercial service ending in 2006.",
            "Universal Postal Union": "International treaty standardized global mail delivery, creating a unified worldwide postal system. Continues to coordinate international mail standards.",
            "Telephone": "Real-time voice communication across distances transformed personal and business interaction. Declining for traditional landlines since mobile phones emerged in the 1980s, but voice calling persists.",
            "Phonograph": "Edison's invention preserved sound for the first time, enabling music distribution and audio recording. Largely replaced by digital formats after the 1990s, though vinyl enjoys niche revival.",
            "Cinema": "Moving pictures created mass visual storytelling medium and shared cultural experiences. Evolved through technology but remains central to storytelling.",
            "Radio": "Wireless broadcast brought instant audio to millions simultaneously, revolutionizing news and entertainment. Continues alongside digital streaming.",
            "Television": "Broadcast video brought visual storytelling into homes worldwide. Transitioned from broadcast to cable to streaming while maintaining cultural dominance.",
            "Satellites": "Orbital communication enabled simultaneous global broadcast and interconnected telecommunications networks. Essential infrastructure for modern communications.",
            "Computers & Internet": "Digital computing and networked systems created entirely new paradigm for information processing and exchange. Foundation of modern information age.",
            "World Wide Web": "Hypertext system democratized information publishing and access globally. Transformed how humanity creates, shares, and discovers knowledge.",
            "Mobile Phones": "Portable cellular communication untethered people from fixed locations. Evolved into smartphones that converge all communication media.",
            "Social Media": "Platforms enabling many-to-many interaction transformed social connection and information distribution. Reshaped public discourse and personal relationships.",
            "Smartphone": "Convergence device combining phone, camera, computer, and internet access into pocket-sized format. Became primary communication and media consumption device globally.",
            "Generative AI": "Machine learning systems capable of creating text, images, and other content. Beginning to transform how humans create and interact with information."
        };

        function getTooltipDescription(tech) {
            return TOOLTIP_DESCRIPTIONS[tech.Watershed] || tech.Description;
        }

        function formatYearWithAgo(year) {
            return `${formatYear(year)} (${formatYearsAgo(year)})`;
        }

        function getDateRange(tech) {
            const startLabel = formatYearWithAgo(tech.Year_Numeric);
            const declineInfo = DECLINING_TECHNOLOGIES[tech.Watershed];

            if (declineInfo && declineInfo.endYear) {
                // Show "Present" for technologies still active today.
                if (declineInfo.endYear === PRESENT_YEAR) {
                    return `${startLabel} – Present`;
                }
                return `${startLabel} – ${formatYearWithAgo(declineInfo.endYear)}`;
            }
            return `${startLabel} – Present`;
        }

        function showTooltip(event, tech, colorScale) {
            const tooltip = d3.select('#tooltip');
            const categoryColor = colorScale(tech.Category);

            tooltip
                .style('opacity', 1)
                .html(`
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px;">
                        <div class="tooltip-title" style="flex: 1;">${tech.Watershed}</div>
                        <div style="font-size: 10px; font-weight: 600; color: ${categoryColor}; margin-left: 12px; white-space: nowrap;">${tech.Category}</div>
                    </div>
                    <div class="tooltip-detail" style="margin-bottom: 8px; color: #999; font-size: 11px;">${getDateRange(tech)}</div>
                    <div class="tooltip-detail" style="line-height: 1.4;">${getTooltipDescription(tech)}</div>
                `);
            moveTooltip(event);
        }

        function moveTooltip(event) {
            const tooltip = d3.select('#tooltip');
            const tooltipWidth = 280;
            const tooltipHeight = 150;
            let left = event.clientX + 15;
            let top = event.clientY - 15;

            if (left + tooltipWidth > window.innerWidth) {
                left = event.clientX - tooltipWidth - 15;
            }
            if (top + tooltipHeight > window.innerHeight) {
                top = window.innerHeight - tooltipHeight - 10;
            }

            tooltip
                .style('left', left + 'px')
                .style('top', top + 'px');
        }

        function hideTooltip() {
            d3.select('#tooltip').style('opacity', 0);
        }

        // ============================================================================
        // GRADIENT CREATION
        // ============================================================================

        function createOpacityGradient(defs, tech, config, xScale) {
            const gradientId = `${tech.toLowerCase().replace(/\s+/g, '-')}-opacity-gradient`;
            const gradient = defs.append('linearGradient')
                .attr('id', gradientId)
                .attr('gradientUnits', 'userSpaceOnUse')
                .attr('x1', xScale(config.startYear))
                .attr('x2', xScale(config.endYear))
                .attr('y1', 0)
                .attr('y2', 0);

            const category = baseData.find(d => d.Watershed === tech).Category;
            const color = CATEGORY_COLORS[category];

            gradient.append('stop')
                .attr('offset', '0%')
                .attr('stop-color', color)
                .attr('stop-opacity', 0.7);

            const fadeStartPercent = ((config.fadeStart - config.startYear) / (config.endYear - config.startYear)) * 100;
            gradient.append('stop')
                .attr('offset', `${fadeStartPercent}%`)
                .attr('stop-color', color)
                .attr('stop-opacity', 0.7);

            gradient.append('stop')
                .attr('offset', '100%')
                .attr('stop-color', color)
                .attr('stop-opacity', config.fadeOpacity);

            return gradientId;
        }

        function createAllGradients(defs, xScale) {
            const gradientConfigs = {
                "Phonograph": { startYear: 1877, endYear: PRESENT_YEAR, fadeStart: 1995, fadeOpacity: 0.2 },
                "Woodblock Printing": { startYear: 700, endYear: PRESENT_YEAR, fadeStart: 1800, fadeOpacity: 0.05 },
                "Telegraph": { startYear: 1844, endYear: 2006, fadeStart: 1920, fadeOpacity: 0.05 },
                "Telephone": { startYear: 1876, endYear: PRESENT_YEAR, fadeStart: 1983, fadeOpacity: 0.5 },
                "Cuneiform": { startYear: -3200, endYear: 100, fadeStart: -1000, fadeOpacity: 0.05 },
                "Hieroglyphics": { startYear: -3100, endYear: 450, fadeStart: 394, fadeOpacity: 0.05 }
            };

            Object.entries(gradientConfigs).forEach(([tech, config]) => {
                createOpacityGradient(defs, tech, config, xScale);
            });
        }

        function updateGradientCoordinates(defs, newXScale) {
            const updates = [
                { id: 'phonograph', x1: 1877, x2: PRESENT_YEAR },
                { id: 'woodblock-printing', x1: 700, x2: PRESENT_YEAR },
                { id: 'telegraph', x1: 1844, x2: 2006 },
                { id: 'telephone', x1: 1876, x2: PRESENT_YEAR },
                { id: 'cuneiform', x1: -3200, x2: 100 },
                { id: 'hieroglyphics', x1: -3100, x2: 450 }
            ];

            updates.forEach(({ id, x1, x2 }) => {
                defs.select(`#${id}-opacity-gradient`)
                    .attr('x1', newXScale(x1))
                    .attr('x2', newXScale(x2));
            });
        }

        // ============================================================================
        // SERIES FILTERING
        // ============================================================================

        function getFilteredSeries(tech) {
            const declineInfo = DECLINING_TECHNOLOGIES[tech.Watershed];
            const endYear = declineInfo
                ? (declineInfo.endYear || declineInfo.declineStart + declineInfo.declineYears)
                : PRESENT_YEAR;

            const filtered = tech.series.filter(d =>
                d.year >= tech.Year_Numeric && d.year <= endYear
            );

            // Ensure start point
            if (!filtered.some(d => d.year === tech.Year_Numeric)) {
                const value = interpolateValue(tech.series, tech.Year_Numeric);
                filtered.unshift({ year: tech.Year_Numeric, value });
            }

            // Ensure end point
            if (!filtered.some(d => d.year === endYear) && tech.Year_Numeric < endYear) {
                const value = interpolateValue(tech.series, endYear);
                filtered.push({ year: endYear, value });
            }

            return filtered;
        }

        // ============================================================================
        // MAIN VISUALIZATION SETUP
        // ============================================================================

        // Generate raw time series for all technologies
        const rawTimeSeriesData = baseData.map(tech => ({
            ...tech,
            series: generateTimeSeries(tech)
        }));

        // Create unified timeline and resample
        const masterTimeline = createMasterTimeline();
        const timeSeriesData = rawTimeSeriesData.map(tech => ({
            ...tech,
            series: resampleSeries(tech.series, masterTimeline)
        }));

        // Setup SVG
        const svg = d3.select('#chart');
        const width = window.innerWidth;
        const height = window.innerHeight;
        svg.attr('width', width).attr('height', height);

        const margin = { top: 80, right: 40, bottom: 40, left: 120 };
        const chartWidth = width - margin.left - margin.right;
        const chartHeight = height - margin.top - margin.bottom;

        const g = svg.append('g')
            .attr('transform', `translate(${margin.left},${margin.top})`);

        // Organize technologies by category
        const orderedTechnologies = [];
        CATEGORIES.forEach(cat => {
            const techs = timeSeriesData.filter(d => d.Category === cat);
            orderedTechnologies.push(...techs);
        });

        // Scales
        const xScale = d3.scaleLinear()
            .domain([-70000, 2050])
            .range([0, chartWidth]);

        const bandHeight = chartHeight / orderedTechnologies.length;
        const getYPosition = (techIndex) => techIndex * bandHeight + bandHeight / 2;

        const colorScale = d3.scaleOrdinal()
            .domain(CATEGORIES)
            .range(CATEGORIES.map(cat => CATEGORY_COLORS[cat]));

        // Create defs section for clip path and gradients
        const defs = g.append('defs');

        defs.append('clipPath')
            .attr('id', 'chart-clip')
            .append('rect')
            .attr('x', 0)
            .attr('y', 0)
            .attr('width', chartWidth)
            .attr('height', chartHeight);

        createAllGradients(defs, xScale);

        // Grid
        const xAxisGrid = d3.axisBottom(xScale)
            .tickSize(chartHeight)
            .tickFormat('');

        g.append('g')
            .attr('class', 'grid')
            .call(xAxisGrid);

        // Main group for zoomable content
        const zoomG = g.append('g')
            .attr('clip-path', 'url(#chart-clip)');

        // ============================================================================
        // DRAW LINES AND INTERACTIVE ELEMENTS
        // ============================================================================

        const linesGroup = zoomG.append('g');
        const dotsGroup = zoomG.append('g').attr('class', 'dots');
        const labelsTextGroup = zoomG.append('g').attr('class', 'tech-labels');

        orderedTechnologies.forEach((tech, techIndex) => {
            const yPos = getYPosition(techIndex);
            const line = d3.line()
                .x(d => xScale(d.year))
                .y(yPos)
                .curve(d3.curveMonotoneX);

            const filteredSeries = getFilteredSeries(tech);
            const declineInfo = DECLINING_TECHNOLOGIES[tech.Watershed];
            const strokeStyle = getStrokeStyle(tech.Watershed, tech.Category);

            // Draw line
            linesGroup.append('path')
                .datum(filteredSeries)
                .attr('class', 'line-path')
                .attr('data-tech-index', techIndex)
                .attr('data-category', tech.Category)
                .attr('data-is-declined', declineInfo ? true : false)
                .attr('d', line)
                .attr('fill', 'none')
                .style('stroke', strokeStyle)
                .style('stroke-width', '3px')
                .style('opacity', 1)
                .on('mouseover', function(event) {
                    d3.select(this)
                        .style('stroke-width', '4px')
                        .style('opacity', 1);
                    showTooltip(event, tech, colorScale);
                })
                .on('mousemove', moveTooltip)
                .on('mouseout', function() {
                    d3.select(this)
                        .style('stroke-width', '3px')
                        .style('opacity', declineInfo && declineInfo.gradient ? 1 : 0.7);
                    hideTooltip();
                });

            // Add arrow at end for active/continuing technologies
            const showArrow = !declineInfo || declineInfo.endYear === PRESENT_YEAR;
            if (showArrow) {
                const arrowOpacity = getArrowOpacity(tech.Watershed);
                linesGroup.append('path')
                    .attr('d', `M ${xScale(PRESENT_YEAR) - 8} ${yPos - 4} L ${xScale(PRESENT_YEAR)} ${yPos} L ${xScale(PRESENT_YEAR) - 8} ${yPos + 4}`)
                    .attr('fill', 'none')
                    .attr('stroke', colorScale(tech.Category))
                    .attr('stroke-width', '3px')
                    .attr('stroke-opacity', arrowOpacity)
                    .attr('data-tech-index', techIndex)
                    .attr('class', 'arrow-end');
            }

            // Add dot at start
            const x = xScale(tech.Year_Numeric);
            dotsGroup.append('circle')
                .attr('cx', x)
                .attr('cy', yPos)
                .attr('r', 4)
                .attr('fill', colorScale(tech.Category))
                .attr('stroke', '#fff')
                .attr('stroke-width', 1.5)
                .attr('data-tech-index', techIndex)
                .style('cursor', 'pointer')
                .on('mouseover', function(event) {
                    d3.select(this).attr('r', 6);
                    showTooltip(event, tech, colorScale);
                })
                .on('mousemove', moveTooltip)
                .on('mouseout', function() {
                    d3.select(this).attr('r', 4);
                    hideTooltip();
                });

            // Add label
            labelsTextGroup.append('text')
                .attr('x', x - 8)
                .attr('y', yPos + 4)
                .attr('data-tech-index', techIndex)
                .attr('text-anchor', 'end')
                .style('font-size', '9px')
                .style('font-family', 'Outfit, sans-serif')
                .style('fill', colorScale(tech.Category))
                .style('font-weight', '600')
                .style('pointer-events', 'none')
                .text(tech.Watershed);
        });

        // Axes
        const xAxis = d3.axisBottom(xScale).tickFormat(formatYearsAgo);
        const xAxisG = g.append('g')
            .attr('class', 'axis')
            .attr('transform', `translate(0,${chartHeight})`)
            .call(xAxis);

        // Left labels (shown when scrolled)
        const leftLabelsGroup = g.append('g').attr('class', 'left-labels');
        orderedTechnologies.forEach((tech, techIndex) => {
            leftLabelsGroup.append('text')
                .attr('x', -10)
                .attr('y', getYPosition(techIndex) + 4)
                .attr('data-tech-index', techIndex)
                .attr('text-anchor', 'end')
                .style('font-size', '10px')
                .style('font-family', 'Outfit, sans-serif')
                .style('fill', colorScale(tech.Category))
                .style('font-weight', '500')
                .style('opacity', 0)
                .text(tech.Watershed);
        });

        // Present Day line
        const presentDayLine = g.append('line')
            .attr('class', 'present-day-line')
            .attr('x1', xScale(PRESENT_YEAR))
            .attr('x2', xScale(PRESENT_YEAR))
            .attr('y1', 0)
            .attr('y2', chartHeight)
            .attr('stroke', '#E53E33')
            .attr('stroke-width', 2)
            .attr('stroke-dasharray', '5,5')
            .attr('opacity', 0.5);

        const presentDayLabel = g.append('text')
            .attr('class', 'present-day-label')
            .attr('x', xScale(PRESENT_YEAR) + 5)
            .attr('y', 15)
            .attr('fill', '#E53E33')
            .attr('font-size', '10px')
            .attr('font-family', 'Outfit, sans-serif')
            .attr('font-weight', '600')
            .text('Present Day');

        // Populate legend
        const legendItems = d3.select('#legend-items');
        CATEGORIES.forEach(cat => {
            const item = legendItems.append('div')
                .style('display', 'flex')
                .style('align-items', 'center')
                .style('gap', '8px')
                .style('margin-bottom', '6px');

            item.append('div')
                .style('width', '16px')
                .style('height', '16px')
                .style('background-color', CATEGORY_COLORS[cat])
                .style('border', '0.5px solid #666')
                .style('flex-shrink', '0');

            item.append('span')
                .style('font-size', '10px')
                .style('color', '#999')
                .text(cat);
        });

        // ============================================================================
        // ZOOM AND PAN
        // ============================================================================

        const initialScale = chartWidth / (xScale(2050) - xScale(1900));
        const initialTranslateX = -xScale(1900) * initialScale;
        const initialTransform = d3.zoomIdentity
            .translate(initialTranslateX, 0)
            .scale(initialScale);

        const zoom = d3.zoom()
            .scaleExtent([1, initialScale * 50])
            .on('zoom', zoomed);

        svg.call(zoom);
        svg.call(zoom.transform, initialTransform);

        function zoomed(event) {
            const transform = event.transform;
            const newXScale = transform.rescaleX(xScale);

            // Update gradient coordinates
            updateGradientCoordinates(defs, newXScale);

            // Update axis
            xAxisG.call(d3.axisBottom(newXScale).tickFormat(formatYearsAgo));

            // Update Present Day line
            const presentDayX = newXScale(PRESENT_YEAR);
            presentDayLine
                .attr('x1', presentDayX)
                .attr('x2', presentDayX);
            presentDayLabel
                .attr('x', presentDayX + 5);

            // Update all technology visualizations
            orderedTechnologies.forEach((tech, techIndex) => {
                const yPos = getYPosition(techIndex);
                const line = d3.line()
                    .x(d => newXScale(d.year))
                    .y(yPos)
                    .curve(d3.curveMonotoneX);

                const filteredSeries = getFilteredSeries(tech);
                const declineInfo = DECLINING_TECHNOLOGIES[tech.Watershed];

                // Update line path
                linesGroup.selectAll('path.line-path')
                    .filter(function() { return d3.select(this).attr('data-tech-index') == techIndex; })
                    .attr('d', line(filteredSeries));

                // Update arrow
                const showArrow = !declineInfo || declineInfo.endYear === PRESENT_YEAR;
                if (showArrow) {
                    const arrowX = newXScale(PRESENT_YEAR);
                    linesGroup.selectAll('path.arrow-end')
                        .filter(function() { return d3.select(this).attr('data-tech-index') == techIndex; })
                        .attr('d', `M ${arrowX - 8} ${yPos - 4} L ${arrowX} ${yPos} L ${arrowX - 8} ${yPos + 4}`);
                }

                // Update dot and label positions
                const x = newXScale(tech.Year_Numeric);
                dotsGroup.selectAll('circle')
                    .filter(function() { return d3.select(this).attr('data-tech-index') == techIndex; })
                    .attr('cx', x);

                labelsTextGroup.selectAll('text')
                    .filter(function() { return d3.select(this).attr('data-tech-index') == techIndex; })
                    .attr('x', x - 8);

                // Show/hide left label based on visibility
                leftLabelsGroup.selectAll('text')
                    .filter(function() { return d3.select(this).attr('data-tech-index') == techIndex; })
                    .style('opacity', x < 0 ? 1 : 0);
            });
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            location.reload();
        });
    </script>
</body>
</html>
