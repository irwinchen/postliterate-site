  <!-- ============ ANNOTATION: 2015 → 2022 trend ============ -->
  <g transform="translate(60, 660)">
    <rect x="0" y="0" width="1080" height="100" fill="#FBE6E3" stroke="#E53E33" stroke-width="1.5"/>
    <text x="20" y="28" class="annot-title">The trend, 2015 → 2022</text>
    <text x="20" y="56" class="annot-body">Argumentative literacy or higher (Levels 4 + 5 + 6 combined) was <tspan font-family="Sono" font-weight="700" fill="#E53E33">29 of 100</tspan> in PISA 2015.</text>
    <text x="20" y="76" class="annot-body">It is now <tspan font-family="Sono" font-weight="700" fill="#E53E33">24 of 100</tspan>. Five fewer students per hundred reach the buffer this chapter defends — in seven years.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="800" x2="1140" y2="800" stroke="#cfcabb" stroke-width="1"/>
  <text x="60" y="826" class="footnote">Sources: OECD (2023), <tspan font-style="italic">PISA 2022 Results (Volume I)</tspan>, Table I.B1.3.2 (proficiency-level percentages, OECD average).</text>
  <text x="60" y="844" class="footnote">Morais, J. (2018), <tspan font-style="italic">Literacy and democracy</tspan>, Lang. Cogn. Neurosci., for the conceptual mapping of his three levels onto PISA Levels 3, 4, and 5+.</text>
  <text x="60" y="862" class="footnote">Pictogram method after Otto Neurath / Marie Reidemeister / Gerd Arntz (Vienna Method, 1920s–30s); each figure = 1 in 100.</text>
  <text x="60" y="884" class="footnote">Note: percentages rounded to nearest integer for one-figure-per-percent representation. "Below L1c" (~0.2%) rounds to 0 figures and is omitted.</text>
</svg>
