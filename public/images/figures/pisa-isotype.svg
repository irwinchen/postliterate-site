    <use href="#person" x="512" y="408" width="14" height="28"/>
    <use href="#person" x="528" y="408" width="14" height="28"/>
    <use href="#person" x="544" y="408" width="14" height="28"/>
    <use href="#person" x="560" y="408" width="14" height="28"/>
    <use href="#person" x="576" y="408" width="14" height="28"/>
    <use href="#person" x="592" y="408" width="14" height="28"/>
    <use href="#person" x="608" y="408" width="14" height="28"/>
    <use href="#person" x="624" y="408" width="14" height="28"/>
    <use href="#person" x="640" y="408" width="14" height="28"/>
    <use href="#person" x="656" y="408" width="14" height="28"/>
    <use href="#person" x="672" y="408" width="14" height="28"/>
    <use href="#person" x="688" y="408" width="14" height="28"/>
    <use href="#person" x="704" y="408" width="14" height="28"/>
  </g>

  <!-- ============ ROW 4: Below productive (51 figures, gray w/ shaded sub-bands) ============ -->
  <g>
    <text x="60" y="518" class="row-name" fill="#4a4a4a">Below productive level</text>
    <text x="60" y="538" class="row-pisa">PISA Level 2 (baseline) and below</text>
    <text x="60" y="570" class="row-count" fill="#4a4a4a">51</text>
    <text x="92" y="570" class="row-count-sub">in 100</text>
  </g>
  <!-- L2 band (24 figures, darker gray) -->
  <g fill="#5a5a5a">
    <use href="#person" x="320" y="518" width="14" height="28"/>
    <use href="#person" x="336" y="518" width="14" height="28"/>
    <use href="#person" x="352" y="518" width="14" height="28"/>
