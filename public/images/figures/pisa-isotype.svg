  </g>
  <!-- L1b band (8 figures, lighter gray) -->
  <g fill="#a0a0a0">
    <use href="#person" x="976" y="518" width="14" height="28"/>
    <use href="#person" x="992" y="518" width="14" height="28"/>
    <use href="#person" x="1008" y="518" width="14" height="28"/>
    <use href="#person" x="1024" y="518" width="14" height="28"/>
    <use href="#person" x="1040" y="518" width="14" height="28"/>
    <use href="#person" x="1056" y="518" width="14" height="28"/>
