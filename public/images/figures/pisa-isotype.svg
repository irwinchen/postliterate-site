<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 920" role="img" aria-label="ISOTYPE-style pictogram chart of PISA 2022 OECD-average reading proficiency. 100 stylized figures arranged in four rows by Morais's literacy taxonomy: 7 with components of creative literacy, 17 at argumentative literacy, 25 at productive literacy, 51 below the productive level.">
  <title>Reading literacy among OECD 15-year-olds, by level (PISA 2022)</title>
  <desc>An ISOTYPE-style population pictogram. Each of 100 figures represents one percent of the OECD average. The figures are arranged in four rows from top to bottom: 7 blue figures for those with creative-literacy components (PISA Levels 5 and 6), 17 red figures for argumentative literacy (PISA Level 4), 25 green figures for productive literacy (PISA Level 3), and 51 gray figures for those below the productive level (PISA Level 2 and below). Annotation notes that argumentative literacy or higher fell from 29 of 100 in 2015 to 24 of 100 in 2022.</desc>
  <defs>
    <symbol id="person" viewBox="0 0 8 20" preserveAspectRatio="xMidYMid meet">
      <circle cx="4" cy="3" r="2.4"/>
      <path d="M 0.8,6 L 7.2,6 L 6.5,18 L 1.5,18 Z"/>
    </symbol>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&amp;family=Literata:ital,wght@0,400;0,500;1,400&amp;family=Sono:wght@400;500;600;700&amp;display=swap');
      .title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 28px; fill: #1a1a1a; }
      .subtitle { font-family: 'Literata', serif; font-style: italic; font-size: 14px; fill: #4a4a4a; }
      .legend { font-family: 'Outfit', sans-serif; font-weight: 500; font-size: 12px; letter-spacing: 0.04em; fill: #6b6b6b; }
      .row-name { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 0.06em; text-transform: uppercase; }
      .row-pisa { font-family: 'Literata', serif; font-style: italic; font-size: 12px; fill: #4a4a4a; }
      .row-count { font-family: 'Sono', monospace; font-weight: 700; font-size: 28px; }
      .row-count-sub { font-family: 'Sono', monospace; font-weight: 400; font-size: 11px; fill: #6b6b6b; }
      .subbreak { font-family: 'Sono', monospace; font-size: 10.5px; fill: #6b6b6b; }
      .annot-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 0.05em; text-transform: uppercase; fill: #E53E33; }
      .annot-body { font-family: 'Literata', serif; font-size: 13px; fill: #1a1a1a; }
      .footnote { font-family: 'Literata', serif; font-size: 11px; fill: #6b6b6b; }
    ]]></style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="920" fill="#F3EFE1"/>

  <!-- Title -->
  <text x="60" y="56" class="title">Reading literacy among OECD 15-year-olds, by level</text>
  <text x="60" y="82" class="subtitle">Each figure represents 1 of every 100 students. Source: PISA 2022, OECD average.</text>

  <!-- Legend / key -->
  <g transform="translate(60, 105)">
    <use href="#person" x="0" y="0" width="14" height="28" fill="#3B6DB4"/>
    <text x="22" y="20" class="legend">Creative components (L5–6)</text>
    <use href="#person" x="220" y="0" width="14" height="28" fill="#E53E33"/>
    <text x="242" y="20" class="legend">Argumentative (L4)</text>
    <use href="#person" x="400" y="0" width="14" height="28" fill="#549E44"/>
    <text x="422" y="20" class="legend">Productive (L3)</text>
    <use href="#person" x="580" y="0" width="14" height="28" fill="#6b6b6b"/>
    <text x="602" y="20" class="legend">Below productive (≤L2)</text>
    <text x="800" y="20" class="legend">Each ▮ = 1% of OECD 15-year-olds</text>
  </g>

  <!-- ============ ROW 1: Creative components (7 figures, blue) ============ -->
  <g>
    <text x="60" y="180" class="row-name" fill="#3B6DB4">With creative components</text>
    <text x="60" y="200" class="row-pisa">PISA Levels 5 and 6</text>
    <text x="60" y="232" class="row-count" fill="#3B6DB4">7</text>
    <text x="92" y="232" class="row-count-sub">in 100</text>
  </g>
  <g fill="#3B6DB4">
    <use href="#person" x="320" y="180" width="14" height="28"/>
    <use href="#person" x="336" y="180" width="14" height="28"/>
