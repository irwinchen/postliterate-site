    <use href="#person" x="672" y="518" width="14" height="28"/>
    <use href="#person" x="688" y="518" width="14" height="28"/>
  </g>
  <!-- L1a band (17 figures, medium gray) -->
  <g fill="#7e7e7e">
    <use href="#person" x="704" y="518" width="14" height="28"/>
    <use href="#person" x="720" y="518" width="14" height="28"/>
    <use href="#person" x="736" y="518" width="14" height="28"/>
