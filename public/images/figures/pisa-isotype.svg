  </g>

  <!-- ============ ROW 3: Productive (25 figures, green) ============ -->
  <g>
    <text x="60" y="408" class="row-name" fill="#549E44">Productive literacy</text>
    <text x="60" y="428" class="row-pisa">PISA Level 3</text>
    <text x="60" y="460" class="row-count" fill="#549E44">25</text>
    <text x="92" y="460" class="row-count-sub">in 100</text>
  </g>
