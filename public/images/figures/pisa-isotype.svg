  <!-- Background highlight band -->
  <rect x="40" y="270" width="1140" height="68" fill="#E53E33" fill-opacity="0.07"/>
  <g>
    <text x="60" y="298" class="row-name" fill="#E53E33">Argumentative literacy</text>
    <text x="60" y="318" class="row-pisa">PISA Level 4 — the buffer this book defends</text>
    <text x="60" y="350" class="row-count" fill="#E53E33">17</text>
    <text x="92" y="350" class="row-count-sub">in 100</text>
  </g>
